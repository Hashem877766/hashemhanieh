<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المراقب - الكيان الرقمي</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0f1d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        /* عنصر الكاميرا الحقيقية في الخلفية */
        #webcamVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.15;
            z-index: 1;
            transform: scaleX(-1); /* قلب الكاميرا كالمرآة */
        }

        /* وضع الدم والرعب الكامل عند الرفض */
        body.blood-active {
            background-color: #2b0000 !important;
            background-image: radial-gradient(circle, #660000 20%, #110000 90%) !important;
        }
        body.blood-active #webcamVideo {
            opacity: 0.05;
            filter: sepia(1) saturate(5) hue-rotate(-50deg);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        /* شاشة مراقبة عين البوت */
        .viewport-box {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #00d2ff;
            box-shadow: 0 0 20px #00d2ff;
            overflow: hidden;
            background: #111625;
            transition: all 0.3s ease;
        }

        body.blood-active .viewport-box {
            border-color: #ff0000;
            box-shadow: 0 0 35px #ff0000;
            animation: shake 0.1s infinite;
        }

        /* عين البوت المتحركة */
        .bot-eye {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #00d2ff 30%, #006688 80%);
            border-radius: 50%;
            top: 35%;
            left: 35%;
            box-shadow: 0 0 15px #00d2ff;
            transition: transform 0.1s linear, background 0.3s ease;
        }

        body.blood-active .bot-eye {
            background: radial-gradient(circle, #ff0000 20%, #550000 80%) !important;
            box-shadow: 0 0 30px #ff0000 !important;
            width: 80px;
            height: 15px;
            border-radius: 4px;
            top: 45%;
            left: 30%;
        }

        /* سيلان الدم من الأعلى */
        .blood-drip {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(139,0,0,0.9) 60%, transparent);
            transition: top 0.6s ease-in-out;
            pointer-events: none;
            z-index: 2;
        }

        body.blood-active .blood-drip {
            top: 0;
        }

        /* صندوق الحوار والخيارات */
        .dialogue-box {
            background: rgba(20, 27, 45, 0.85);
            border: 1px solid #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        body.blood-active .dialogue-box {
            background: rgba(40, 0, 0, 0.95);
            border-color: #ff0000;
            color: #ffcccc;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        .bot-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
